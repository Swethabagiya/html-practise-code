<!DOCTYPE html>
<html lang=""en>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width ,initial-scale=1.0">
        <title>Office Schedule</title>
        <style>
            table,th,td {
                border:1px solid black;
            }
            table{
                border-collapse:collapse;
            }
        </style>
    </head>
    <body>
        <center>
        <table >
           
                <tr>
                    <th></th>
                    <th scope="col">Monday</th>
                    <th scope="col">Tuesday</th>
                    <th scope="col">Wednesday</th>
                    <th scope="col">Thursday</th>
                    <th scope="col">Friday</th>
                </tr>
                
            
            
                <tr>
                    <th scope="row">9.00 to 10.00</th>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                </tr>
                <tr>
                    <th scope="row">10.00 to 11.00</th>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Open</td>
                </tr>
                <tr>
                   <th scope="row">11.00 to 12.00</th>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                </tr>
                <tr>
                   <th scope="row">12.00 to 13.00</th> 
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                </tr>
        
                <tr>
                    <th scope="row">13.00 to 14.00</th>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Closed</td>
                    <td>Open</td>
                    <td>Open</td>
                </tr>
            
        </table>
        </center>
    </body>
</html>
